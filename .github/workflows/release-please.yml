name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Auto-merge release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          # release-please-action v4 outputs pr as a JSON object; extract the number
          PR_NUMBER=$(echo '${{ steps.release.outputs.pr }}' | jq -r 'if type == "object" then .number else . end')
          echo "Merging release PR #${PR_NUMBER}"
          gh pr merge "${PR_NUMBER}" --merge --repo "${{ github.repository }}"
