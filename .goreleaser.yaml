version: 2

project_name: garminslacknotify

before:
  hooks:
    - go mod tidy

builds:
  - id: garminslacknotify
    main: ./cmd/garminslacknotify
    binary: garminslacknotify
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - config.example.yaml

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
